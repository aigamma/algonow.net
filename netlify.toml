# Static multi-page React site plus one light write function (/api/tel, the
# TTS telemetry ingest). No SPA fallback: every page is a real HTML entry, and
# Netlify serves 404.html for anything else.

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# API routes go to functions.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# algohome.net is a soft alias: once both domains point at this site, any
# algohome request 301s to the same path on algonow.net.
[[redirects]]
  from = "https://algohome.net/*"
  to = "https://algonow.net/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.algohome.net/*"
  to = "https://algonow.net/:splat"
  status = 301
  force = true

# Content-hashed build assets are immutable.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers for all routes. Everything is same-origin: no web fonts, no
# external scripts, no third-party embeds. connect-src 'self' covers the
# telemetry beacon; speech synthesis is a browser API and needs no grants.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'"
